<svg width="80" height="80" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- WoLingo Bunny Mascot -->
<defs>
  <linearGradient id="bunnyBody" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FFC94A"/>
    <stop offset="100%" stop-color="#F5A623"/>
  </linearGradient>
</defs>

<!-- left ear -->
<g>
  <ellipse cx="72" cy="42" rx="19" ry="46" transform="rotate(-18 72 42)" fill="url(#bunnyBody)" stroke="#fff" stroke-width="4"/>
  <ellipse cx="72" cy="44" rx="9" ry="30" transform="rotate(-18 72 44)" fill="#E8483C"/>
</g>
<!-- right ear -->
<g>
  <ellipse cx="112" cy="34" rx="19" ry="50" transform="rotate(10 112 34)" fill="url(#bunnyBody)" stroke="#fff" stroke-width="4"/>
  <ellipse cx="112" cy="34" rx="9" ry="33" transform="rotate(10 112 34)" fill="#E8483C"/>
</g>

<!-- raised paw -->
<g>
  <ellipse cx="158" cy="82" rx="16" ry="24" transform="rotate(28 158 82)" fill="url(#bunnyBody)" stroke="#fff" stroke-width="4"/>
  <circle cx="150" cy="62" r="4.5" fill="#E8483C"/>
  <circle cx="160" cy="58" r="4.5" fill="#E8483C"/>
  <circle cx="169" cy="63" r="4.5" fill="#E8483C"/>
</g>

<!-- head/body -->
<path d="M60 92 C58 60 78 40 105 40 C135 40 155 62 152 96 C150 128 132 158 100 158 C68 158 62 122 60 92 Z" fill="url(#bunnyBody)" stroke="#fff" stroke-width="4"/>

<!-- ear-scratch arm -->
<ellipse cx="55" cy="105" rx="17" ry="24" transform="rotate(-20 55 105)" fill="url(#bunnyBody)" stroke="#fff" stroke-width="4"/>
<path d="M48 88 Q58 92 54 104" fill="none" stroke="#C9601A" stroke-width="3" stroke-linecap="round"/>
<path d="M56 86 Q66 92 60 104" fill="none" stroke="#C9601A" stroke-width="3" stroke-linecap="round"/>

<!-- feet -->
<ellipse cx="82" cy="172" rx="20" ry="13" fill="url(#bunnyBody)" stroke="#fff" stroke-width="4"/>
<ellipse cx="120" cy="172" rx="20" ry="13" fill="url(#bunnyBody)" stroke="#fff" stroke-width="4"/>
<path d="M74 174 q4 6 8 0" stroke="#C9601A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<path d="M86 175 q4 6 8 0" stroke="#C9601A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<path d="M112 175 q4 6 8 0" stroke="#C9601A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<path d="M124 174 q4 6 8 0" stroke="#C9601A" stroke-width="2.5" fill="none" stroke-linecap="round"/>

<!-- star -->
<path d="M108 118 l4.5 9.2 10.1 1.5 -7.3 7.2 1.7 10.1 -9 -4.8 -9 4.8 1.7 -10.1 -7.3 -7.2 10.1 -1.5 z" fill="#3CA55C"/>

<!-- face -->
<circle cx="90" cy="90" r="17" fill="#FFE7B0"/>
<circle cx="118" cy="86" r="17" fill="#FFE7B0"/>
<circle cx="94" cy="92" r="7" fill="#fff"/>
<circle cx="94" cy="93" r="4.2" fill="#16324A"/>
<circle cx="122" cy="88" r="7" fill="#fff"/>
<circle cx="123" cy="89" r="4.2" fill="#16324A"/>
<path d="M100 108 q6 6 12 0" fill="none" stroke="#C9601A" stroke-width="2.5" stroke-linecap="round"/>
</svg>
